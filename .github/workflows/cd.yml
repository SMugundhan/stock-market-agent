# .github/workflows/cd.yml
# This is a SEPARATE file from ci.yml
# CI and CD are separate concerns — keeps each file focused

name: CD — Build, Push & Deploy

on:
  push:
    branches: [main]
    # CD only triggers on main branch pushes
    # NOT on pull requests — we don't deploy PRs
    # NOT on develop branch — only verified, merged code deploys

  workflow_run:
    workflows: ["CI — Test Suite"]
    types: [completed]
    branches: [main]
    # Alternatively trigger AFTER CI workflow completes
    # This ensures CD never runs if CI hasn't passed

jobs:
  # ══════════════════════════════════════════════════
  # JOB 1: Build Docker image and push to Docker Hub
  # ══════════════════════════════════════════════════
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    # Only run if triggered by push OR if CI workflow succeeded
    if: |
      github.event_name == 'push' ||
      github.event.workflow_run.conclusion == 'success'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
      # outputs: lets this job pass data to the next job

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Read version from VERSION file ─────────────
      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          # $GITHUB_OUTPUT = special file that stores step outputs
          # echo "key=value" >> $GITHUB_OUTPUT = set an output variable
          echo "Building version: $VERSION"

      # ── Set up Docker Buildx ───────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx enables advanced features:
        # - Multi-platform builds (amd64 + arm64)
        # - Better layer caching
        # - BuildKit performance improvements

      # ── Login to Docker Hub ────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # DOCKERHUB_TOKEN = Docker Hub access token (not your password)
          # Create at: hub.docker.com → Account Settings → Security
          # → New Access Token → copy the token → add as GitHub Secret

      # ── Generate image metadata and tags ──────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/stock-market-agent
          # Your image name: mugundhan/stock-market-agent
          tags: |
            VERSION=$(cat VERSION | tr -d '\n' | tr -d '"')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Building version: $VERSION"
          # This generates 3 tags for your image:
          # mugundhan/stock-market-agent:1.0.0     ← version tag
          # mugundhan/stock-market-agent:latest     ← always points to newest
          # mugundhan/stock-market-agent:sha-b359d9e ← git commit hash
          #
          # Why 3 tags?
          # :latest      → easy to pull "current version"
          # :1.0.0       → pin to specific version, rollback possible
          # :sha-abc123  → trace exactly which commit built this image

      # ── Build and Push ─────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # push: true → actually push to Docker Hub (unlike CI where false)
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # GitHub Actions cache for Docker layers
          # Subsequent builds only rebuild changed layers
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          # Build args get baked into the image as metadata

      # ── Verify push succeeded ──────────────────────
      - name: Verify image on Docker Hub
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stock-market-agent:latest
          echo "✅ Image successfully pushed and pullable"
          docker inspect ${{ secrets.DOCKERHUB_USERNAME }}/stock-market-agent:latest \
            | grep -i "created"

  # ══════════════════════════════════════════════════
  # JOB 2: Deploy to Render.com
  # ══════════════════════════════════════════════════
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    # needs: = only run AFTER build-and-push succeeds
    # If Docker push fails, deployment never starts

    environment:
      name: production
      url: ${{ vars.RENDER_APP_URL }}
      # 'environment' creates a deployment record in GitHub
      # Shows up in repo as: "deployed to production"
      # Gives you a deployment history timeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Deploy via Render Deploy Hook ──────────────
      - name: Trigger Render deployment
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          # Render provides a "deploy hook" URL
          # One POST request to this URL triggers a new deployment
          # Render will: pull latest image → stop old container → start new one
          #
          # How to get this URL:
          # Render Dashboard → Your Service → Settings → Deploy Hook → Copy URL
          # Add as GitHub Secret: RENDER_DEPLOY_HOOK

      # ── Wait for deployment to complete ───────────
      - name: Wait for deployment
        run: sleep 60
        # Render typically takes 30-90 seconds to:
        # 1. Pull new Docker image from Docker Hub
        # 2. Stop old container
        # 3. Start new container
        # 4. Run health checks
        # We wait 60 seconds before checking

      # ── Health check ──────────────────────────────
      - name: Verify deployment health
        run: |
          APP_URL="${{ vars.RENDER_APP_URL }}"
          # vars.RENDER_APP_URL = your Render app URL
          # e.g. https://stock-market-agent.onrender.com
          # Add as GitHub Variable (not secret — it's public anyway)

          echo "Checking health at: $APP_URL/health"

          # Retry health check up to 5 times with 15s gaps
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health")
            # curl flags:
            # -s = silent (no progress bar)
            # -o /dev/null = discard response body
            # -w "%{http_code}" = only output the HTTP status code

            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i) — HTTP $STATUS"
              exit 0
              # exit 0 = success, stop the loop
            fi

            echo "⏳ Health check attempt $i failed (HTTP $STATUS) — retrying..."
            sleep 15
          done

          echo "❌ Health check failed after 5 attempts"
          exit 1
          # exit 1 = failure — this marks the step as failed

      # ── Notify success ────────────────────────────
      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Deployment successful!"
          echo "Version: ${{ needs.build-and-push.outputs.version }}"
          echo "URL: ${{ vars.RENDER_APP_URL }}"
          echo "Commit: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"
          # In production you'd send this to Slack:
          # curl -X POST $SLACK_WEBHOOK -d '{"text":"✅ Deployed v1.0.0"}'

      # ── Notify failure + rollback instruction ──────
      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Rollback command:"
          echo "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stock-market-agent:previous-tag"
          # In production you'd trigger automatic rollback here
          # or page the on-call engineer via PagerDuty
          #
