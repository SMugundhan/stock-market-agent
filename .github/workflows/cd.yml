# .github/workflows/cd.yml
# CD workflow — runs only after CI passes.
#
# Render is now connected directly to this GitHub repo (Auto-Deploy: Yes),
# so Render builds and deploys the Docker image itself on every push to main.
# This workflow no longer builds/pushes an image — its only job now is to
# wait for Render's own deploy to finish, then verify the app is actually
# healthy (Render can report "deploy succeeded" even if the app crashes on
# startup for a reason Render itself can't detect, e.g. a missing env var).

name: CD — Verify Deployment

on:
  workflow_run:
    workflows: ["CI — Test Suite"]
    types: [completed]
  workflow_dispatch:

# Prevent overlapping CD runs from racing each other
concurrency:
  group: cd-production
  cancel-in-progress: true

jobs:
  verify-deployment:
    name: Verify Render Deployment Health
    runs-on: ubuntu-latest
    # Only proceed if triggered by a successful CI run on main,
    # OR if manually dispatched
    if: >
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main') ||
      github.event_name == 'workflow_dispatch'

    environment:
      name: production
      url: ${{ vars.RENDER_APP_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      # ── Read version from VERSION file (for logging only now) ──
      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '\n' | tr -d '\r' | tr -d '"' | xargs)
          echo "Raw VERSION content: $VERSION"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid VERSION format: '$VERSION'. Expected semver like 1.2.0"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Expecting version: $VERSION"

      # Render's own build+deploy runs asynchronously as soon as it sees
      # the push — give it time to finish building and restarting before
      # we start polling /health, otherwise we'll just catch the OLD
      # version still serving during the swap.
      - name: Wait for Render build & deploy
        run: sleep 90

      - name: Verify deployment health
        run: |
          APP_URL="${{ vars.RENDER_APP_URL }}"
          echo "Checking health at: $APP_URL/health"
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i) — HTTP $STATUS"
              exit 0
            fi
            echo "⏳ Health check attempt $i failed (HTTP $STATUS) — retrying..."
            sleep 15
          done
          echo "❌ Health check failed after 6 attempts"
          exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Deployment verified healthy!"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "URL: ${{ vars.RENDER_APP_URL }}"
          echo "Commit: ${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "Verified by: ${{ github.actor }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment health check failed!"
          echo "Check the Render dashboard for build/runtime logs:"
          echo "${{ vars.RENDER_APP_URL }}"
          echo "If needed, use Render's dashboard Rollback button on the previous successful deploy."
