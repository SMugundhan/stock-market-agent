# .github/workflows/cd.yml
# CD workflow — runs only after CI passes

name: CD — Build, Push & Deploy

on:
  workflow_run:
    workflows: ["CI — Test Suite"]
    types: [completed]
  workflow_dispatch: # optional manual trigger

jobs:
  # ══════════════════════════════════════════════════
  # JOB 1: Build Docker image and push to Docker Hub
  # ══════════════════════════════════════════════════
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Guard: Ensure CI passed ────────────────────
      - name: Ensure CI passed
        run: |
          echo "Checking latest CI run status..."
          CI_STATUS=$(gh run list --workflow "CI — Test Suite" --branch main --json conclusion -q '.[0].conclusion')
          echo "Latest CI status: $CI_STATUS"
          if [ "$CI_STATUS" != "success" ]; then
            echo "❌ CI has not passed yet. Exiting CD."
            exit 1
          fi

      # ── Read version from VERSION file ─────────────
      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '\n' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/stock-market-agent
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Verify image on Docker Hub
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stock-market-agent:latest
          echo "✅ Image successfully pushed and pullable"
          docker inspect ${{ secrets.DOCKERHUB_USERNAME }}/stock-market-agent:latest | grep -i "created"

  # ══════════════════════════════════════════════════
  # JOB 2: Deploy to Render.com
  # ══════════════════════════════════════════════════
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push

    environment:
      name: production
      url: ${{ vars.RENDER_APP_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render deployment
        run: curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Wait for deployment
        run: sleep 60

      - name: Verify deployment health
        run: |
          APP_URL="${{ vars.RENDER_APP_URL }}"
          echo "Checking health at: $APP_URL/health"
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (attempt $i) — HTTP $STATUS"
              exit 0
            fi
            echo "⏳ Health check attempt $i failed (HTTP $STATUS) — retrying..."
            sleep 15
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Deployment successful!"
          echo "Version: ${{ needs.build-and-push.outputs.version }}"
          echo "URL: ${{ vars.RENDER_APP_URL }}"
          echo "Commit: ${{ github.sha }}"
          echo "Deployed by: ${{ github.actor }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Rollback command:"
          echo "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/stock-market-agent:previous-tag"
